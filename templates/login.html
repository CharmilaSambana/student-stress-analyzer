<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: 'Segoe UI';
            background: linear-gradient(to right, #42a5f5, #478ed1);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        h2 {
            color: #1565c0;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background: #1565c0;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 6px;
            width: 95%;
            cursor: pointer;
        }

        a {
            color: #1565c0;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>🔐 Login</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        <button type="submit">Login</button>
    </form>

    <p>New user? <a href="/register">Register</a></p>
</div>

</body>
</html>
