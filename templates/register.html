```
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        height: 100vh;

        /* 🔥 PREMIUM GRADIENT */
        background: linear-gradient(135deg, #667eea, #764ba2);

        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* CARD */
    .card {
        display: flex;
        width: 750px;
        border-radius: 20px;
        overflow: hidden;
        background: white;
        box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    /* LEFT SIDE */
    .left {
        flex: 1;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        padding: 40px;

        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .left h1 {
        font-size: 28px;
        margin-bottom: 10px;
    }

    .left p {
        font-size: 14px;
        opacity: 0.9;
    }

    /* RIGHT SIDE */
    .right {
        flex: 1;
        padding: 40px;
        text-align: center;
    }

    .right h2 {
        margin-bottom: 20px;
        color: #333;
    }

    input {
        width: 90%;
        padding: 12px;
        margin: 10px 0;

        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    input:focus {
        outline: none;
        border: 1px solid #667eea;
        box-shadow: 0 0 6px rgba(102,126,234,0.5);
    }

    button {
        width: 95%;
        padding: 12px;
        margin-top: 10px;

        border: none;
        border-radius: 8px;

        background: linear-gradient(45deg, #ff7e5f, #feb47b);
        color: white;

        font-size: 15px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.05);
    }

    .login-link {
        margin-top: 15px;
        font-size: 14px;
    }

    .login-link a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
    }

    .login-link a:hover {
        text-decoration: underline;
    }

    /* MOBILE */
    @media (max-width: 768px) {
        .card {
            flex-direction: column;
            width: 90%;
        }

        .left {
            text-align: center;
        }
    }

</style>
```

</head>

<body>

<div class="card">

<!-- RIGHT SIDE -->
<div class="right">

    <h2>Create Account</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <input type="password" name="confirm" placeholder="Confirm Password" required>

        <button type="submit">Register</button>
    </form>

    <div class="login-link">
        Already have an account? <a href="/login">Login</a>
    </div>

</div>
