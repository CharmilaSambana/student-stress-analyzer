<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register | MindCare AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

/* 🎨 COLOR CHANGED (green-blue theme) */
background: linear-gradient(135deg,#11998e,#38ef7d);
}

/* GLASS CARD */
.box{
width:350px;
padding:35px;
border-radius:18px;
text-align:center;

background: rgba(255,255,255,0.1);
backdrop-filter: blur(15px);

box-shadow:0 10px 40px rgba(0,0,0,0.3);
color:white;
}

/* TITLE */
h2{
margin-bottom:10px;
font-weight:600;
}

.sub{
font-size:14px;
color:#e0f7f1;
margin-bottom:20px;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
outline:none;

background: rgba(255,255,255,0.2);
color:white;
}

input::placeholder{
color:#e0f7f1;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:25px;

/* 🎨 BUTTON MATCHED THEME */
background: linear-gradient(90deg,#00f260,#0575e6);
color:white;
font-size:15px;
cursor:pointer;

transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* LINK */
p{
margin-top:15px;
font-size:14px;
}

a{
color:#00f260;
text-decoration:none;
}

a:hover{
text-decoration:underline;
}

/* LOGO */
.logo{
font-size:22px;
margin-bottom:10px;
}

a {
    position: relative;
    z-index: 100;
    cursor: pointer;
}

.box {
    position: relative;
    z-index: 1;
}

body {
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

input:focus {
    outline: none;
    border: 1px solid #00f2fe;
    box-shadow: 0 0 8px rgba(0,242,254,0.5);
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:25px;

    background: linear-gradient(90deg,#00c6ff,#0072ff);
    color:white;
    font-size:15px;
    cursor:pointer;

    transition: all 0.3s ease;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.logo {
    font-size:22px;
    margin-bottom:10px;
    text-shadow: 0 0 10px rgba(255,255,255,0.5);
}
</style>
</head>

<body>

<div class="box">

<div class="logo">🧠 MindCare AI</div>

<h2>Create Account</h2>
<div class="sub">Start your stress-free journey today</div>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<input type="password" name="confirm" placeholder="Confirm Password" required>

<button type="submit">Register</button>

</form>

<p style="margin-top:15px;">
    Already have an account? 
    <a href="/login" style="color:#00f2fe; font-weight:600;">
        Login
    </a>
</p>

</div>

</body>
</html>
