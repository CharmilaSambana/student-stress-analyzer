<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register | MindCare AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#11998e,#38ef7d);
}

/* GLASS CARD */
.box{
width:360px;
padding:35px;
border-radius:18px;
text-align:center;

background: rgba(255,255,255,0.1);
backdrop-filter: blur(15px);

box-shadow:0 10px 40px rgba(0,0,0,0.3);
color:white;
}

/* TITLE */
h2{
margin-bottom:10px;
font-weight:600;
}

.sub{
font-size:14px;
color:#eee;
margin-bottom:20px;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
outline:none;

background: rgba(255,255,255,0.2);
color:white;
}

input::placeholder{
color:#eee;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:25px;

background: linear-gradient(90deg,#ff7e5f,#feb47b);
color:white;
font-size:15px;
cursor:pointer;

transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* LINK */
p{
margin-top:15px;
font-size:14px;
}

a{
color:#fff;
text-decoration:none;
font-weight:500;
}

a:hover{
text-decoration:underline;
}

/* LOGO */
.logo{
font-size:22px;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="box">

<div class="logo">🧠 MindCare AI</div>

<h2>Create Account</h2>
<div class="sub">Start your stress-free journey</div>

<form method="POST">
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<input type="password" name="confirm" placeholder="Confirm Password" required>

<button type="submit">Register</button>
</form>

<p>Already have account? <a href="/login">Login</a></p>

</div>

</body>
</html>
